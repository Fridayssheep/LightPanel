services:
  lightpanel:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UV_DEFAULT_INDEX: ${UV_DEFAULT_INDEX:-}
        UV_INDEX_URL: ${UV_INDEX_URL:-}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
    container_name: lightpanel-backend
    env_file:
      - path: .env
        required: false
    environment:
      LIGHTPANEL_DATA_DIR: /app/data
      LIGHTPANEL_HISTORY_FILE: /app/data/incidents.json
      LIGHTPANEL_RUNTIME_SETTINGS_FILE: /app/data/settings.json
      LIGHTPANEL_LOG_ROOTS: /app/samples/logs
      LIGHTPANEL_PROJECT_ROOTS: /app/samples
      LIGHTPANEL_REQUIRE_DANGEROUS_APPROVAL: "true"
    expose:
      - "8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
      - ./samples:/app/samples
    restart: unless-stopped

  lightpanel-web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lightpanel-web
    depends_on:
      - lightpanel
    ports:
      - "8000:80"
    restart: unless-stopped
